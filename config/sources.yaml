# =============================================================================
# VZhTelegram Source List — 80+ RSS/web sources for monitoring
# =============================================================================
# Each source has:
#   id:        unique identifier
#   name:      human-readable name
#   url:       RSS feed URL or website URL
#   type:      rss | web (web = scraper fallback)
#   category:  topic category for scoring
#   tier:      1 (premium) | 2 (strong) | 3 (supplementary) — authority weight
#   language:  en | ru
#   selectors: (optional) CSS selectors for web scraping fallback
