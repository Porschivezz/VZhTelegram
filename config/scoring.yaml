# =============================================================================
# Scoring configuration — weights, thresholds, topic keywords
# =============================================================================
# Adjust weights and thresholds to tune content selection quality.
# Total weight MUST sum to 1.0.
# =============================================================================

scoring:
  weights:
    topic_relevance: 0.30      # Match to channel themes
    freshness: 0.20            # Exponential decay from publish time
    source_authority: 0.20     # Tier-based authority score
    engagement: 0.15           # Social signals (where available)
    uniqueness: 0.15           # Inverse similarity to recent content

  # Freshness decay: score = exp(-lambda * hours_since_publish)
  freshness_lambda: 0.18      # At 12h → ~0.11, at 6h → ~0.34, at 1h → ~0.84

  thresholds:
    minimum_score: 0.45        # Below this → discard
    auto_select_above: 0.80    # Above this → always include

  limits:
    max_posts_per_cycle: 5     # Max drafts per hourly cycle
    min_posts_per_cycle: 0     # Allow zero if nothing qualifies
    max_from_same_source: 2    # Diversity: max articles from one source
    max_from_same_category: 3  # Diversity: max articles from one category

  # Authority scores by tier (used in source_authority factor)
  tier_scores:
    1: 1.0
    2: 0.7
    3: 0.4

# =============================================================================
# Topic definitions — keywords for topic_relevance scoring
# =============================================================================
# Each topic has:
#   weight: how important this topic is to the channel (0.0-1.0)
#   keywords_en: English keywords
#   keywords_ru: Russian keywords (optional, for Russian-language sources)
#   categories: source categories that auto-match this topic
# =============================================================================

