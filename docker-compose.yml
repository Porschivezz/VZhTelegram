services:
  vzhtelegram:
    build: .
    container_name: vzhtelegram
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data          # Persist SQLite database
      - ./config:/app/config      # Allow config hot-editing
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
